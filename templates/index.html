<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Typography Art Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cinzel:wght@400;700;900&family=Dancing+Script:wght@400;700&family=Lobster&family=Oswald:wght@400;700&family=Playfair+Display:wght@400;700;900&family=Press+Start+2P&family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- CSS外部読み込み -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-gray-900 text-white min-h-screen p-6 font-sans">
    
    <div class="max-w-4xl mx-auto">
        <h1 class="text-4xl font-bold text-center mb-8">Typography Art Generator</h1>
        
        <form action="/preview" method="POST" class="flex justify-center gap-2 mb-8">
            <input type="text" name="text_content" class="p-3 rounded-lg text-gray-900 w-full max-w-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="文章を入力して生成..." required>
            <button type="submit" class="bg-white text-gray-900 px-6 py-3 rounded-lg font-bold hover:bg-gray-200 transition">生成</button>
        </form>

        {% if preview %}
        <div id="canvas" class="p-10 rounded-2xl flex flex-wrap justify-center items-center gap-6 min-h-[300px] shadow-2xl mb-8" style="background-color: {{ preview.bg_color }}; transition: background-color 0.1s;">
            {% for item in preview.styled_words %}
                <span class="word inline-block cursor-default {{ item.get('effect', '') }}" 
                      style="font-family: '{{ item.font }}'; font-weight: {{ item.weight }};"
                      data-base-hue="{{ item.hue }}">
                    {{ item.text }}
                </span>
            {% endfor %}
        </div>

        <div class="flex flex-col items-center gap-4 mb-12">
            <label class="text-sm text-gray-400">スライダーでカオス度を調整</label>
            <input type="range" id="slider" min="0" max="100" value="20" class="w-full max-w-sm h-3 bg-gray-700 rounded-lg appearance-none cursor-pointer">
            <form action="/save" method="POST" id="save-form">
                <input type="hidden" name="text_content" value="{{ preview.text }}">
                <input type="hidden" name="styles_json" id="styles_json" value="">
                <input type="hidden" name="bg_color" id="bg_color" value="{{ preview.bg_color }}">
                <input type="hidden" name="intensity" id="intensity" value="20">
                <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-full font-bold shadow-lg transition">保存</button>
            </form>
        </div>
        {% endif %}

        <h2 class="text-2xl font-bold text-white mb-6 border-b border-gray-700 pb-2">過去のアート作品</h2>
        <div class="grid grid-cols-1 gap-10 pb-20">
            {% for art in gallery %}
            <div class="p-6 rounded-xl border border-gray-700 bg-gray-800 shadow-lg">
                <div class="p-10 rounded-2xl flex flex-wrap justify-center items-center gap-6 shadow-2xl mb-4 overflow-hidden min-h-[300px]" style="background-color: {{ art.bg_color }};">
                    {% for item in art.styles %}
                        <span class="{{ item.get('effect', '') }}" 
                              style="display: inline-block;
                                     font-family: '{{ item.get('font', 'Roboto') }}'; 
                                     font-weight: {{ item.get('weight', '400') }}; 
                                     color: {% if item.get('color') %}{{ item.get('color') }}{% elif item.get('hue') %}hsl({{ item.get('hue') }}, 80%, 75%){% else %}white{% endif %}; 
                                     font-size: {{ item.get('fontSize', '1.2rem') }};
                                     transform: {{ item.get('transform', 'none') }};
                                     {% if item.get('strokeColor') %}-webkit-text-stroke-color: {{ item.get('strokeColor') }};{% endif %}">
                            {{ item.get('text', '') }}
                        </span>
                    {% endfor %}
                </div>
                <p class="text-gray-400 text-sm text-center">ID: {{ art.id }} - {{ art.text_content }}</p>
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        const slider = document.getElementById('slider');
        const words = document.querySelectorAll('.word');
        const intensityInput = document.getElementById('intensity');
        const saveForm = document.getElementById('save-form');
        const stylesJsonInput = document.getElementById('styles_json');
        const canvas = document.getElementById('canvas');
        const bgColorInput = document.getElementById('bg_color');
        const effectsList = ['art-shadow', 'art-glow', 'art-blur', 'art-hollow'];

        if (words.length > 0) {
            const updateArt = (intensity) => {
                const bgHue = Math.floor(Math.random() * 360);
                const randomBgColor = `hsl(${bgHue}, 40%, 15%)`;
                if (canvas && bgColorInput) {
                    canvas.style.backgroundColor = randomBgColor;
                    bgColorInput.value = randomBgColor;
                }
                words.forEach(word => {
                    const baseHue = parseInt(word.dataset.baseHue);
                    const randomFactor = 0.3 + Math.random() * 1.7;
                    word.style.fontSize = ((0.5 + (intensity / 10)) * randomFactor) + 'rem';
                    word.style.transform = `rotate(${(Math.random() - 0.5) * (intensity * 3)}deg)`;
                    word.classList.remove('art-shadow', 'art-glow', 'art-blur', 'art-hollow');
                    const randomEffect = effectsList[Math.floor(Math.random() * effectsList.length)];
                    word.classList.add(randomEffect);
                    const colorVal = `hsl(${(baseHue + Math.random() * (intensity * 3)) % 360}, 80%, 75%)`;
                    word.style.color = colorVal;
                    word.style.webkitTextStrokeColor = (randomEffect === 'art-hollow') ? colorVal : '';
                });
            };
            slider.oninput = (e) => {
                intensityInput.value = e.target.value;
                updateArt(e.target.value);
            };
            updateArt(slider.value);
            saveForm.addEventListener('submit', () => {
                stylesJsonInput.value = JSON.stringify(Array.from(words).map(word => ({
                    text: word.innerText.trim(),
                    font: word.style.fontFamily.replace(/['"]/g, ''),
                    weight: word.style.fontWeight,
                    effect: Array.from(word.classList).find(c => c.startsWith('art-')),
                    color: word.style.color,
                    strokeColor: word.style.webkitTextStrokeColor,
                    fontSize: word.style.fontSize,
                    transform: word.style.transform
                })));
            });
        }
    </script>
</body>
</html>
